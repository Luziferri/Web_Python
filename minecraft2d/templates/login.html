{% extends "base.html" %}
{% block title %}Login · Minecraft 2D{% endblock %}
{% block body_class %}auth-page auth-page--minecraft{% endblock %}
{% block content %}
<section class="auth-screen auth-screen--minecraft">
  <div class="auth-backdrop"></div>
  <div class="auth-menu-card">
    <div class="auth-logo-block">
      <p class="eyebrow">Minecraft 2D</p>
      <h2>Login</h2>
      <p class="auth-tagline">Entra no mundo, gere recursos e constrói a tua aldeia.</p>
    </div>

    <form method="post" class="auth-form auth-form--minecraft">
      <label>
        <span>Username</span>
        <input type="text" name="username" placeholder="O teu nome de jogador" required>
      </label>
      <label>
        <span>Password</span>
        <input type="password" name="password" placeholder="••••••••" required>
      </label>
      <button type="submit" class="primary-button primary-button--minecraft">Entrar</button>
    </form>

    <p class="auth-link auth-link--minecraft">Ainda não tens conta? <a href="{{ url_for('auth.register') }}">Regista-te</a></p>
  </div>
</section>
{% endblock %}
