{% extends "base.html" %}
{% block title %}Registo · Minecraft 2D{% endblock %}
{% block content %}
<section class="auth-card">
  <h2>Criar conta</h2>
  <form method="post" class="auth-form">
    <label>Username
      <input type="text" name="username" required>
    </label>
    <label>Email
      <input type="email" name="email" required>
    </label>
    <label>Password
      <input type="password" name="password" required>
    </label>
    <button type="submit" class="primary-button">Registar</button>
  </form>
  <p class="auth-link">Já tens conta? <a href="{{ url_for('auth.login') }}">Faz login</a></p>
</section>
{% endblock %}
